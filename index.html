<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Correção de Provas AR + OCR + ChatGPT</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.1/dist/tesseract.min.js"></script>
  <style>
    body, html {
      margin: 0; padding: 0; font-family: sans-serif;
      background: black; color: white; overflow: hidden;
    }
    video, canvas {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh; object-fit: cover; z-index: 0;
    }
    #output {
      position: fixed; bottom: 40px; /* Ajustado para não sobrepor os botões */
      width: 100%; background: rgba(0,0,0,0.8);
      padding: 10px; font-size: 16px; z-index: 2;
      max-height: 40vh; overflow-y: auto; box-sizing: border-box;
    }
    #controls {
      position: fixed; bottom: 10px; left: 50%;
      transform: translateX(-50%); z-index: 3;
      display: flex; gap: 10px;
    }
    button {
      font-size: 16px; padding: 10px 16px;
      background: #0d6efd; border: none;
      border-radius: 8px; color: white; cursor: pointer;
    }
    button:hover { background: #0056b3; }
    button:disabled { background: #555; cursor: not-allowed; }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

<div id="controls">
  <button id="zoomBtn">🔍 Zoom: 1x</button>
  <button id="captureBtn">📷 Corrigir</button>
</div>

<div id="output">📷 Aponte a câmara para a resposta da prova e toque em "Corrigir"</div>

<script>
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const output = document.getElementById("output");
  const zoomBtn = document.getElementById("zoomBtn");
  const captureBtn = document.getElementById("captureBtn");

  let mediaTrack;
  let currentZoom = 1;
  const zoomLevels = [1, 1.5, 2, 3];
  let zoomCapabilities = null;

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { exact: "environment" },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      });
      video.srcObject = stream;
      mediaTrack = stream.getVideoTracks()[0];
      zoomCapabilities = mediaTrack.getCapabilities().zoom;
      if (!zoomCapabilities) {
        zoomBtn.disabled = true;
        zoomBtn.innerText = "Zoom N/A";
      }
    } catch (err) {
      console.error("Erro ao iniciar a câmara:", err);
      output.innerText = "❌ Erro ao aceder à câmara. Verifique as permissões.";
    }
  }

  function toggleZoom() {
    if (!zoomCapabilities) return;
    const currentIndex = zoomLevels.indexOf(currentZoom);
    currentZoom = zoomLevels[(currentIndex + 1) % zoomLevels.length];
    
    if (currentZoom > zoomCapabilities.max) {
      currentZoom = zoomLevels[0]; // Volta ao início
    }

    mediaTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] });
    zoomBtn.innerText = `🔍 Zoom: ${currentZoom}x`;
  }

  async function captureAndAnalyze() {
    captureBtn.disabled = true;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    output.innerText = "🧠 A ler resposta com OCR...";

    try {
      const { data: { text } } = await Tesseract.recognize(canvas, 'por', {
        logger: m => {
          if (m.status === 'recognizing text') {
            output.innerText = `🧠 A ler... (${Math.round(m.progress * 100)}%)`;
          }
        }
      });

      output.innerText = `🔎 Texto detetado:\n"${text.trim()}"\n\nA enviar para IA...`;

      // **MUDANÇA IMPORTANTE:** A chamada agora é para o nosso próprio backend.
      // A Vercel irá redirecionar esta chamada para o ficheiro /api/corrigir.js
      const response = await fetch("/api/corrigir", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto: text })
      });

      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error || `Erro do servidor: ${response.status}`);
      }

      const data = await response.json();
      output.innerText = `✅ Correção:\n\n${data.resultado}`;

    } catch (err) {
      console.error("Erro na análise:", err);
      output.innerText = `❌ Erro: ${err.message}`;
    } finally {
      captureBtn.disabled = false;
    }
  }

  zoomBtn.addEventListener('click', toggleZoom);
  captureBtn.addEventListener('click', captureAndAnalyze);

  startCamera();
</script>

</body>
</html>
